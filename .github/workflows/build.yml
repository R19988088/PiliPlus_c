name: Build

on:
    push:
        paths-ignore:
            - "**.md"
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:
            build_android:
                description: "Build Android"
                required: false
                default: true
                type: boolean

            build_ios:
                description: "Build iOS"
                required: false
                default: true
                type: boolean

            build_mac:
                description: "Build Mac"
                required: false
                default: true
                type: boolean

            build_win_x64:
                description: "Build Win-x64"
                required: false
                default: true
                type: boolean

            build_linux_x64:
                description: "Build Linux-x64"
                required: false
                default: true
                type: boolean

            tag:
                description: "tag"
                required: false
                default: ""
                type: string

jobs:
    android:
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_android == 'true' }}
        name: Release Android
        runs-on: ubuntu-latest
        permissions: write-all

        steps:
            - name: 代码迁出
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: 构建Java环境
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"
                  cache: "gradle"
                  cache-dependency-path: |
                      android/*.gradle*
                      android/**/gradle-wrapper.properties

            - name: 安装Flutter
              uses: subosito/flutter-action@v2
              id: flutter-action
              with:
                  channel: stable
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Apply Patch
              shell: pwsh
              run: lib/scripts/patch.ps1 android
              continue-on-error: true

            - name: Write key
              if: github.event_name != 'pull_request'
              run: |
                  if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
                    echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
                    echo storeFile='key.jks' >> android/key.properties
                    echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
                    echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
                    echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> android/key.properties
                  else
                    echo "SIGN_KEYSTORE_BASE64 is not set; falling back to debug signing."
                  fi

            - name: Set and Extract version
              if: ${{ github.event_name != 'pull_request' }}
              shell: pwsh
              run: |
                  try {
                    lib/scripts/build.ps1 android *>&1 | Tee-Object -FilePath android-version.log
                    if ($LASTEXITCODE -ne $null -and $LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                    }
                  } catch {
                    $_ | Tee-Object -FilePath android-version.log -Append
                    exit 1
                  }

            - name: Flutter Build Release Apk
              if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
              shell: bash
              run: |
                  set -o pipefail
                  flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub 2>&1 | tee android-build.log

            - name: Flutter Build Dev Apk
              if: ${{ github.event_name == 'pull_request' }}
              shell: bash
              run: |
                  set -o pipefail
                  flutter build apk --release --split-per-abi --android-project-arg dev=1 --dart-define-from-file=pili_release.json --pub 2>&1 | tee android-build.log

            - name: Show Android build failure details
              if: ${{ failure() }}
              shell: bash
              run: |
                  {
                    echo "## Android build failed"
                    echo
                    echo "Commit: \`${{ github.sha }}\`"
                    echo "Branch: \`${{ github.ref_name }}\`"
                    echo
                    echo "### Version script log"
                    echo '```text'
                    if [ -f android-version.log ]; then
                      tail -n 120 android-version.log
                    else
                      echo "android-version.log was not created."
                    fi
                    echo '```'
                    echo
                    echo "### Flutter build log"
                    echo '```text'
                    if [ -f android-build.log ]; then
                      tail -n 200 android-build.log
                    else
                      echo "android-build.log was not created. The failure happened before Flutter build started."
                    fi
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"

                  if [ -f android-build.log ]; then
                    message="$(tail -n 40 android-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
                    echo "::error title=Android build failed::$message"
                  elif [ -f android-version.log ]; then
                    message="$(tail -n 40 android-version.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
                    echo "::error title=Android version script failed::$message"
                  else
                    echo "::error title=Android build failed::android build logs were not created. The failure happened before version/build steps started."
                  fi

            - name: Rename
              run: |
                  shopt -s nullglob
                  for file in build/app/outputs/flutter-apk/app-*-release.apk; do
                    abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
                    mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
                  done
              shell: bash

            - name: Release
              if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.tag }}
                  name: ${{ github.event.inputs.tag }}
                  files: PiliPlus_android_*.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_arm64-v8a
                  path: PiliPlus_android_*_arm64-v8a.apk
                  if-no-files-found: ignore

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_armeabi-v7a
                  path: PiliPlus_android_*_armeabi-v7a.apk
                  if-no-files-found: ignore

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_x86_64
                  path: PiliPlus_android_*_x86_64.apk
                  if-no-files-found: ignore

    ios:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_ios == 'true' }}
        uses: ./.github/workflows/ios.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    mac:
        if: ${{ github.event.inputs.build_mac == 'true' }}
        uses: ./.github/workflows/mac.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    win_x64:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
        uses: ./.github/workflows/win_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    linux_x64:
        if: ${{ github.event.inputs.build_linux_x64 == 'true' }}
        uses: ./.github/workflows/linux_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
